version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: percepta-postgres
    environment:
      POSTGRES_USER: percepta
      POSTGRES_PASSWORD: percepta_dev
      POSTGRES_DB: percepta
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U percepta']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: percepta-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
